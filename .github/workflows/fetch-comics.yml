name: Fetch Comics Data

on:
  schedule:
    # Run twice daily: 6am and 6pm UTC
    - cron: '0 6,18 * * *'
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

# Prevent concurrent runs from conflicting
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    # Only fetch data on schedule or manual trigger, not on every push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch comic data
        run: node scripts/fetch-comics.js
        timeout-minutes: 5

      - name: Check for changes
        id: changes
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git commit -m "Update comic data [automated]"
          git push

  deploy:
    runs-on: ubuntu-latest
    # Deploy on push OR after fetch-data completes (if it ran)
    if: always() && (github.event_name == 'push' || needs.fetch-data.result == 'success' || needs.fetch-data.result == 'skipped')
    needs: fetch-data
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Assemble site directory
        run: |
          mkdir -p _site/data
          cp index.html style.css app.js _site/
          cp data/*.json _site/data/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
